name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

# Annule les runs de PR obsolètes ; ne jamais abandonner un run sur main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  # Le build Nuxt peut dépasser 2 Go de RAM.
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/setup
      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: ./.github/actions/setup
      - name: Build
        run: pnpm build
